# Action versions verified via GitHub API 2026-06-10.
# Tag-mapping syntax: metadata-action README [CITED].
# Permissions model: GitHub Packages docs [CITED].
name: CI

on:
  push:
    branches: ['**']                      # every branch push triggers CI
    tags: ['v[0-9]+.[0-9]+.[0-9]+*']      # only semver-shaped tags trigger publish

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: 22        # match prod image node:22-alpine
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test             # vitest run — already non-interactive, no flags needed

  publish:
    needs: test                   # D-07: structurally gated on green tests
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write             # D-06: built-in GITHUB_TOKEN, no extra secrets
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4; required for type=gha cache
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6
        id: meta
        with:
          images: ghcr.io/thejuran/ytfortv
          tags: |
            type=raw,value=dev,enable={{is_default_branch}}
            type=semver,pattern={{raw}}
          # latest=auto (default flavor) adds :latest for semver tags automatically
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7
        if: steps.meta.outputs.tags != ''  # skip cleanly if tag mapping produced nothing (malformed tag)
        with:
          context: .
          platforms: linux/amd64   # NAS target; amd64 runner → no QEMU
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
